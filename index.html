<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boop the Crab!</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="comic-panel" aria-labelledby="app-title">
        <p class="eyebrow">Issue #13 delivery slice</p>
        <header class="masthead">
          <p class="wordmark-kicker">Tiny tragic crustacean comic</p>
          <h1 id="app-title" class="wordmark">Boop the Crab!</h1>
        </header>

        <figure class="crab-card" aria-labelledby="crab-stage-title crab-stage-description">
          <div
            id="crab-stage"
            class="crab-stage"
            data-stage="sleeping"
            role="img"
            aria-labelledby="crab-stage-title crab-stage-description"
            aria-describedby="count-summary mood-announcement"
          >
            <div class="sleep-zs" aria-hidden="true">
              <span class="sleep-z sleep-z-one">Z</span>
              <span class="sleep-z sleep-z-two">Z</span>
              <span class="sleep-z sleep-z-three">Z</span>
            </div>

            <svg id="crab-svg" class="crab-svg" viewBox="0 0 320 240" aria-hidden="true" focusable="false">
              <defs>
                <linearGradient id="shellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#fb923c" />
                  <stop offset="100%" stop-color="#ea580c" />
                </linearGradient>
                <linearGradient id="clawGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#fdba74" />
                  <stop offset="100%" stop-color="#f97316" />
                </linearGradient>
              </defs>

              <g class="shadow-layer" aria-hidden="true">
                <ellipse cx="160" cy="204" rx="108" ry="20" />
              </g>

              <g class="crab-live">
                <g class="legs left-legs">
                  <path d="M92 160 C70 164, 48 174, 30 194" />
                  <path d="M104 170 C82 178, 66 194, 54 212" />
                  <path d="M118 178 C102 192, 94 206, 90 222" />
                </g>
                <g class="legs right-legs">
                  <path d="M228 160 C250 164, 272 174, 290 194" />
                  <path d="M216 170 C238 178, 254 194, 266 212" />
                  <path d="M202 178 C218 192, 226 206, 230 222" />
                </g>

                <g class="claws left-claw">
                  <path class="claw-arm" d="M106 112 C78 102, 62 82, 54 58" />
                  <path class="claw-shape" d="M34 34 C14 44, 10 68, 26 82 C40 92, 58 88, 64 72 C58 74, 44 70, 38 58 C46 58, 60 52, 66 40 C56 26, 44 24, 34 34 Z" />
                </g>

                <g class="claws right-claw">
                  <path class="claw-arm" d="M214 112 C242 102, 258 82, 266 58" />
                  <path class="claw-shape" d="M286 34 C306 44, 310 68, 294 82 C280 92, 262 88, 256 72 C262 74, 276 70, 282 58 C274 58, 260 52, 254 40 C264 26, 276 24, 286 34 Z" />
                </g>

                <g class="body">
                  <path class="shell" d="M88 130 C88 86, 120 54, 160 54 C200 54, 232 86, 232 130 C232 172, 200 192, 160 192 C120 192, 88 172, 88 130 Z" />
                  <path class="shell-shine" d="M116 116 C124 88, 148 72, 174 72" />
                  <ellipse class="cheek cheek-left" cx="122" cy="136" rx="12" ry="7" />
                  <ellipse class="cheek cheek-right" cx="198" cy="136" rx="12" ry="7" />
                </g>

                <g class="eyes sleeping-eyes">
                  <path class="eyestalk" d="M138 86 C134 66, 134 52, 138 36" />
                  <path class="eyestalk" d="M182 86 C186 66, 186 52, 182 36" />
                  <path class="sleep-lid" d="M126 31 Q138 23 150 31" />
                  <path class="sleep-lid" d="M170 31 Q182 23 194 31" />
                </g>

                <g class="eyes perked-eyes">
                  <path class="eyestalk" d="M138 84 C132 62, 132 46, 138 30" />
                  <path class="eyestalk" d="M182 84 C188 62, 188 46, 182 30" />
                  <circle class="eyeball" cx="138" cy="28" r="14" />
                  <circle class="eyeball" cx="182" cy="28" r="14" />
                  <circle class="pupil" cx="138" cy="30" r="5" />
                  <circle class="pupil" cx="182" cy="30" r="5" />
                </g>

                <g class="eyes thrilled-eyes">
                  <path class="eyestalk" d="M138 84 C132 62, 130 46, 132 28" />
                  <path class="eyestalk" d="M182 84 C188 62, 190 46, 188 28" />
                  <circle class="eyeball" cx="132" cy="26" r="15" />
                  <circle class="eyeball" cx="188" cy="26" r="15" />
                  <circle class="pupil pupil-wide" cx="132" cy="26" r="5" />
                  <circle class="pupil pupil-wide" cx="188" cy="26" r="5" />
                  <circle class="sparkle" cx="126" cy="20" r="3" />
                  <circle class="sparkle" cx="182" cy="20" r="3" />
                </g>

                <g class="eyes ecstatic-eyes">
                  <path class="eyestalk" d="M138 84 C130 58, 126 42, 126 20" />
                  <path class="eyestalk" d="M182 84 C190 58, 194 42, 194 20" />
                  <circle class="eyeball" cx="126" cy="18" r="16" />
                  <circle class="eyeball" cx="194" cy="18" r="16" />
                  <circle class="pupil pupil-wide" cx="126" cy="18" r="5" />
                  <circle class="pupil pupil-wide" cx="194" cy="18" r="5" />
                  <circle class="sparkle sparkle-big" cx="118" cy="10" r="4" />
                  <circle class="sparkle sparkle-big" cx="186" cy="10" r="4" />
                </g>

                <g class="eyes glum-eyes">
                  <path class="eyestalk" d="M138 84 C132 62, 132 46, 138 30" />
                  <path class="eyestalk" d="M182 84 C188 62, 188 46, 182 30" />
                  <circle class="eyeball" cx="138" cy="28" r="14" />
                  <circle class="eyeball" cx="182" cy="28" r="14" />
                  <path class="sad-lid" d="M126 29 Q138 18 150 29" />
                  <path class="sad-lid" d="M170 29 Q182 18 194 29" />
                  <circle class="pupil" cx="138" cy="33" r="4" />
                  <circle class="pupil" cx="182" cy="33" r="4" />
                </g>

                <g class="eyes decay-eyes">
                  <path class="eyestalk" d="M138 86 C132 64, 132 50, 138 34" />
                  <path class="eyestalk" d="M182 86 C188 64, 188 50, 182 34" />
                  <path class="cross-eye" d="M130 20 L146 36 M146 20 L130 36" />
                  <path class="cross-eye" d="M174 20 L190 36 M190 20 L174 36" />
                </g>

                <g class="mouths">
                  <path class="mouth mouth-sleeping" d="M132 154 Q160 161 188 154" />
                  <path class="mouth mouth-perked" d="M132 154 Q160 168 188 154" />
                  <path class="mouth mouth-thrilled" d="M126 148 Q160 180 194 148" />
                  <path class="mouth mouth-ecstatic" d="M122 144 Q160 188 198 144" />
                  <path class="mouth mouth-glum" d="M130 164 Q160 142 190 164" />
                  <path class="mouth mouth-decay" d="M130 168 Q160 152 190 168" />
                </g>
              </g>

              <g class="crab-dead">
                <g class="legs left-legs">
                  <path d="M94 164 C72 170, 52 184, 36 196" />
                  <path d="M110 174 C86 184, 74 198, 62 214" />
                  <path d="M126 182 C108 196, 100 208, 96 222" />
                </g>
                <g class="legs right-legs">
                  <path d="M226 164 C248 170, 268 184, 284 196" />
                  <path d="M210 174 C234 184, 246 198, 258 214" />
                  <path d="M194 182 C212 196, 220 208, 224 222" />
                </g>
                <g class="body">
                  <path class="shell" d="M92 136 C92 96, 122 68, 160 68 C198 68, 228 96, 228 136 C228 174, 198 194, 160 194 C122 194, 92 174, 92 136 Z" />
                  <path class="crack" d="M160 74 L150 108 L168 124 L150 150 L162 188" />
                  <path class="cross-eye" d="M126 110 L146 130 M146 110 L126 130" />
                  <path class="cross-eye" d="M174 110 L194 130 M194 110 L174 130" />
                  <path class="mouth mouth-dead-flat" d="M132 164 L188 164" />
                </g>
              </g>

              <g class="crab-husk">
                <g class="shells">
                  <path class="shell" d="M96 140 C96 102, 124 74, 160 74 C196 74, 224 102, 224 140 C224 174, 196 196, 160 196 C124 196, 96 174, 96 140 Z" />
                  <path class="shell-ridge" d="M116 122 C136 106, 184 106, 204 122" />
                  <path class="shell-ridge" d="M112 148 C134 136, 186 136, 208 148" />
                  <path class="shell-hole" d="M152 124 C156 116, 164 116, 168 124 C166 134, 154 134, 152 124 Z" />
                  <path class="shell-hole shell-hole-low" d="M142 160 C150 148, 170 148, 178 160 C172 176, 148 176, 142 160 Z" />
                </g>
              </g>

              <g class="crab-skeleton">
                <g class="legs left-legs">
                  <path d="M100 164 C76 170, 56 182, 38 198" />
                  <path d="M112 176 C90 184, 74 196, 60 214" />
                  <path d="M124 184 C108 198, 98 210, 94 224" />
                </g>
                <g class="legs right-legs">
                  <path d="M220 164 C244 170, 264 182, 282 198" />
                  <path d="M208 176 C230 184, 246 196, 260 214" />
                  <path d="M196 184 C212 198, 222 210, 226 224" />
                </g>
                <g class="body">
                  <path class="shell" d="M92 136 C92 96, 122 68, 160 68 C198 68, 228 96, 228 136 C228 174, 198 194, 160 194 C122 194, 92 174, 92 136 Z" />
                  <path class="rib" d="M132 98 L132 176" />
                  <path class="rib" d="M160 90 L160 182" />
                  <path class="rib" d="M188 98 L188 176" />
                  <path class="rib rib-curve" d="M116 126 C134 116, 186 116, 204 126" />
                  <path class="rib rib-curve" d="M112 148 C134 138, 186 138, 208 148" />
                  <circle class="bone-eye" cx="138" cy="118" r="12" />
                  <circle class="bone-eye" cx="182" cy="118" r="12" />
                  <circle class="socket" cx="138" cy="118" r="5" />
                  <circle class="socket" cx="182" cy="118" r="5" />
                  <path class="mouth mouth-death" d="M132 164 L188 164" />
                  <path class="teeth" d="M140 158 L140 170 M152 158 L152 170 M164 158 L164 170 M176 158 L176 170" />
                </g>
                <g class="scythe">
                  <path class="scythe-handle" d="M252 24 L214 204" />
                  <path class="scythe-blade" d="M248 30 C286 24, 304 54, 286 88 C270 82, 254 66, 248 30 Z" />
                  <path class="scythe-grip" d="M226 138 Q212 146 206 160" />
                </g>
              </g>
            </svg>
          </div>
          <figcaption class="crab-caption">
            <span id="crab-stage-title" class="crab-title">Sleeping crab</span>
            <span id="crab-stage-description" class="crab-description">
              Fresh zero state. The crab is snoozing until the next dramatic boop.
            </span>
          </figcaption>
        </figure>

        <div class="control-strip">
          <div class="count-card" aria-labelledby="count-label">
            <span id="count-label" class="count-label">Boops</span>
            <output
              id="boop-count"
              class="count-value"
              aria-live="polite"
              aria-atomic="true"
              aria-describedby="count-summary"
            >
              0
            </output>
          </div>

          <div class="button-row" aria-label="Boop controls">
            <button id="boop-button" class="action-button action-button-primary" type="button">Boop</button>
            <button id="deboop-button" class="action-button action-button-secondary" type="button">De-boop</button>
          </div>
        </div>

        <p id="count-summary" class="assistive-copy" aria-live="polite" aria-atomic="true">
          Current boop count: 0.
        </p>
        <p id="mood-announcement" class="assistive-copy" role="status" aria-live="polite" aria-atomic="true">
          Sleeping crab. Fresh zero state. The crab is snoozing until the next dramatic boop.
        </p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
